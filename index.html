<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#378ADD">
<title>ルート比較ナビ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
header{background:#378ADD;padding:14px 16px;position:sticky;top:0;z-index:100}
header h1{font-size:17px;font-weight:600;color:#fff}
header p{font-size:11px;color:rgba(255,255,255,0.8);margin-top:2px}
.container{padding:12px 16px;max-width:560px;margin:0 auto;padding-bottom:40px}
.card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:12px;border:0.5px solid #e0e0e0}
.sec{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.hint{font-size:11px;color:#666;line-height:1.6;margin-bottom:10px;padding:8px 10px;background:#f0f5ff;border-radius:8px;border-left:3px solid #378ADD}
.input-wrap{position:relative;margin-bottom:6px}
.input-wrap input{width:100%;padding:10px 12px 10px 36px;font-size:14px;border:0.5px solid #d0d0d0;border-radius:8px;background:#fafafa;color:#1d1d1f;-webkit-appearance:none}

.input-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px}
.resolved{font-size:11px;padding-left:12px;margin-bottom:8px;min-height:14px;color:#1D9E75}
.resolved.err{color:#A32D2D}
.gps-btn{width:100%;padding:9px;font-size:13px;border:0.5px solid #378ADD;border-radius:8px;background:#f0f5ff;color:#185FA5;cursor:pointer;text-align:center;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px}
.dest-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.dest-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f5f5f7;border-radius:8px;border:0.5px solid #e0e0e0;cursor:pointer}
.dest-item.sel{border:1.5px solid #E24B4A;background:#fff5f5}
.dest-name{font-size:13px;font-weight:600;color:#1d1d1f;flex:1}
.dest-addr{font-size:11px;color:#888}
.dest-del{font-size:12px;color:#ccc;padding:4px 8px;cursor:pointer}
.add-dest-btn{width:100%;padding:9px;font-size:13px;border:0.5px dashed #d0d0d0;border-radius:8px;background:#fafafa;color:#888;cursor:pointer;text-align:center;margin-bottom:8px}
.walk-row{display:flex;gap:6px;margin-bottom:4px}
.wbtn{flex:1;padding:8px 4px;font-size:12px;border:0.5px solid #d0d0d0;border-radius:8px;background:#fafafa;color:#555;cursor:pointer;text-align:center}
.wbtn.on{border:1.5px solid #1D9E75;background:#E1F5EE;color:#0F6E56}
.region-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.rbtn{padding:6px 10px;font-size:12px;border:0.5px solid #d0d0d0;border-radius:20px;background:#fafafa;color:#555;cursor:pointer}
.rbtn.on{border:1.5px solid #378ADD;background:#E6F1FB;color:#185FA5}
.winter-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff8e6;border-radius:8px;border:0.5px solid #FAC775;margin-bottom:8px}
.winter-label{font-size:12px;color:#633806;flex:1}
.winter-toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.winter-toggle input{opacity:0;width:0;height:0}
.winter-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:11px;transition:.3s}
.winter-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
.winter-toggle input:checked+.winter-slider{background:#EF9F27}
.winter-toggle input:checked+.winter-slider:before{transform:translateX(18px)}
.go{width:100%;padding:13px;font-size:15px;font-weight:600;border:none;border-radius:10px;background:#378ADD;color:#fff;cursor:pointer}
.go:disabled{background:#aaa}
#map{width:100%;height:300px;border-radius:10px;background:#e0e8f0;margin-bottom:8px}
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:6px 0}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.leg-line{width:20px;height:3px;border-radius:2px}
.flow-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;border:0.5px solid #e0e0e0;cursor:pointer}
.flow-card.best{border:2px solid #378ADD}
.flow-card.sel{border:2px solid #1D9E75}
.flow-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.flow-title{font-size:13px;font-weight:600;color:#1d1d1f;flex:1;padding-right:8px}
.flow-total{text-align:right;flex-shrink:0}
.flow-cost{font-size:16px;font-weight:600;color:#1d1d1f}
.flow-time{font-size:11px;color:#888}
.flow-steps{display:flex;flex-direction:column;gap:4px}
.flow-step{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px}
.step-icon{font-size:15px;flex-shrink:0;width:22px;text-align:center}
.step-body{flex:1}
.step-main{font-size:12px;font-weight:500;color:#1d1d1f}
.step-sub{font-size:11px;color:#888;margin-top:1px}
.step-cost{font-size:12px;font-weight:500;color:#1d1d1f;text-align:right;white-space:nowrap;min-width:50px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-bottom:6px}
.badge.best{background:#E6F1FB;color:#185FA5}
.badge.fast{background:#E1F5EE;color:#085041}
.sum-row{display:flex;gap:8px;margin-bottom:12px}
.scard{flex:1;background:#f5f5f7;border-radius:8px;padding:8px;text-align:center}
.sl{font-size:10px;color:#888;margin-bottom:2px}
.sv{font-size:13px;font-weight:600;color:#1d1d1f}
.ss{font-size:10px;color:#aaa;margin-top:1px}
.errmsg{background:#FCEBEB;color:#A32D2D;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:10px}
.disc{font-size:10px;color:#aaa;line-height:1.6;margin-top:8px;padding-top:8px;border-top:0.5px solid #eee}
#results{display:none}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:20px;width:calc(100% - 40px);max-width:400px}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
.modal input{width:100%;padding:10px 12px;font-size:14px;border:0.5px solid #d0d0d0;border-radius:8px;margin-bottom:8px;-webkit-appearance:none;color:#1d1d1f}
.modal input:focus{outline:none;border-color:#378ADD}
.modal-resolved{font-size:11px;color:#1D9E75;margin-bottom:8px;min-height:14px}
.modal-resolved.err{color:#A32D2D}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.modal-btns button{flex:1;padding:10px;font-size:14px;border-radius:8px;cursor:pointer;font-weight:500}
.modal-cancel{background:#f5f5f7;border:0.5px solid #e0e0e0;color:#555}
.modal-save{background:#378ADD;border:none;color:#fff}

<body>
<header>
<h1>🗺 ルート比較ナビ</h1>
<p>出発地から目的地まで最適ルートを提案</p>
</header>
<div class="container">
<div class="card">
<div class="sec">現在地 / 出発地</div>
<button class="gps-btn" id="gps-btn" onclick="getGPS()">
<span style="font-size:16px">📍</span> GPSで現在地を取得
</button>
<div class="input-wrap">
<span class="input-icon">🔵</span>
<input type="text" id="from-input" placeholder="または住所・駅名を入力" autocomplete="off" onblur="resolveFrom()"/>
</div>
<div class="resolved" id="from-resolved"></div>
</div>
<div class="card">
<div class="sec">目的地</div>
<div class="dest-list" id="dest-list"></div>
<button class="add-dest-btn" onclick="openModal()">＋ よく使う場所を登録</button>
<div style="text-align:center;font-size:11px;color:#aaa;margin:4px 0 8px">または直接入力</div>
<div class="input-wrap">
<span class="input-icon">🔴</span>
<input type="text" id="to-input" placeholder="目的地を入力" autocomplete="off" onblur="resolveTo()"/>
</div>
<div class="resolved" id="to-resolved"></div>
</div>
<div class="card">
<div class="sec">徒歩許容距離</div>
<div class="hint">出発地・降車駅からこの距離以内なら徒歩で向かいます。範囲外はタクシーを使います。</div>
<div class="walk-row">
<div class="wbtn on" id="w-500" onclick="setWalk(500)">500m以内</div>
<div class="wbtn" id="w-1000" onclick="setWalk(1000)">1km以内</div>
<div class="wbtn" id="w-none" onclick="setWalk(9999)">制限なし</div>
</div>
<div class="sec" style="margin-top:12px">乗り換え設定</div>
<div class="walk-row">
<div class="wbtn on" id="tr-yes" onclick="setTransfer(true)">🔄 乗り換えあり（最安優先）</div>
<div class="wbtn" id="tr-no" onclick="setTransfer(false)">🧳 乗り換えなし（直通のみ）</div>
</div>
<div style="font-size:11px;color:#888;margin-top:4px;padding-left:2px">荷物が多いときは「乗り換えなし」がおすすめです</div>
</div>
<div class="card">
<div class="sec">タクシー料金地域</div>
<div class="region-row">
<div class="rbtn on" id="r-sapporo" onclick="setReg('sapporo')">札幌</div>
<div class="rbtn" id="r-tokyo" onclick="setReg('tokyo')">東京</div>
<div class="rbtn" id="r-osaka" onclick="setReg('osaka')">大阪</div>
<div class="rbtn" id="r-nagoya" onclick="setReg('nagoya')">名古屋</div>
<div class="rbtn" id="r-other" onclick="setReg('other')">その他</div>
</div>
<div class="winter-row" id="winter-row">
<div class="winter-label">❄️ 冬季割増（2割増）を適用<br><span style="font-size:10px;color:#aaa">札幌：12/17〜3/26対象</span></div>
<label class="winter-toggle">
<input type="checkbox" id="winter-check" checked>
<span class="winter-slider"></span>
</label>
</div>
<button class="go" id="go-btn" onclick="search()">最適ルートを検索する</button>
</div>
<div id="results">
<div class="sum-row" id="sum-row"></div>
<div class="card" style="padding:12px">
<div class="sec" style="margin-bottom:6px">地図（ルートをタップで切替）</div>
<div id="map"></div>
<div class="legend" id="map-legend"></div>
</div>
<div class="sec">ルート比較</div>
<div id="result-list"></div>
<p class="disc" id="disc-text"></p>
</div>
</div>
<div class="modal-bg" id="modal-bg">
<div class="modal">
<h3>よく使う場所を登録</h3>
<input type="text" id="modal-name" placeholder="名前（例：自宅、職場）"/>
<input type="text" id="modal-addr" placeholder="住所・施設名" onblur="resolveModal()"/>
<div class="modal-resolved" id="modal-resolved"></div>
<div class="modal-btns">
<button class="modal-cancel" onclick="closeModal()">キャンセル</button>
<button class="modal-save" onclick="saveModal()">保存</button>
</div>
</div>
</div>
<script>
const APIKEY='AIzaSyBgF7d_zuAMKnxtEKUAFU89URmUV_1wJTQ';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 札幌地下鉄 全駅データ（路線・駅番号付き）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    ]
  },

    stations:[
      {id:'T01',name:'宮の沢',lat:43.0611,lng:141.2694},

      {id:'T03',name:'琴似',lat:43.0611,lng:141.3027},
      {id:'T04',name:'二十四軒',lat:43.0611,lng:141.3156},
      {id:'T05',name:'西28丁目',lat:43.0611,lng:141.3262},
      {id:'T06',name:'円山公園',lat:43.0556,lng:141.3201},
      {id:'T07',name:'西18丁目',lat:43.0579,lng:141.3324},
      {id:'T08',name:'西11丁目',lat:43.0601,lng:141.3424},
      {id:'T09',name:'大通',lat:43.0606,lng:141.3543},
      {id:'T10',name:'バスセンター前',lat:43.0614,lng:141.3641},
      {id:'T11',name:'菊水',lat:43.0566,lng:141.3748},
      {id:'T12',name:'東札幌',lat:43.0543,lng:141.3870},
      {id:'T13',name:'白石',lat:43.0543,lng:141.3991},
      {id:'T14',name:'南郷7丁目',lat:43.0456,lng:141.4071},
      {id:'T15',name:'南郷13丁目',lat:43.0375,lng:141.4126},
      {id:'T16',name:'南郷18丁目',lat:43.0298,lng:141.4159},
      {id:'T17',name:'大谷地',lat:43.0231,lng:141.4215},
      {id:'T18',name:'ひばりが丘',lat:43.0165,lng:141.4307},

    ]
  },

    stations:[
      {id:'H01',name:'栄町',lat:43.1009,lng:141.3801},

      {id:'H03',name:'元町',lat:43.0789,lng:141.3760},
      {id:'H04',name:'環状通東',lat:43.0712,lng:141.3712},
      {id:'H05',name:'東区役所前',lat:43.0672,lng:141.3660},
      {id:'H06',name:'北13条東',lat:43.0703,lng:141.3602},
      {id:'H07',name:'さっぽろ',lat:43.0686,lng:141.3543},
      {id:'H08',name:'大通',lat:43.0606,lng:141.3543},
      {id:'H09',name:'豊水すすきの',lat:43.0543,lng:141.3580},

      {id:'H14',name:'福住',lat:43.0078,lng:141.3823}
    ]
  }
};

const TRANSFER_STATIONS = {
  'さっぽろ': ['N06','H07'],
  '大通': ['N07','T09','H08']
};

const ALL_STATIONS = [];
Object.entries(SAPPORO_SUBWAY).forEach(([line, data])=>{
  data.stations.forEach(s=>{
    ALL_STATIONS.push({...s, line, lineName:data.name, lineColor:data.color});
  });
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 【修正①】最寄り駅検索：徒歩許容距離内で最近隣のN駅上位を返す
// 出発側は walkLimit 内を優先、なければ最近隣1駅のみ返す
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getNearbyStationsFromData(latLng, radius) {
  const results = [];
  ALL_STATIONS.forEach(s => {
    const stLatLng = new google.maps.LatLng(s.lat, s.lng);
    const dist = google.maps.geometry.spherical.computeDistanceBetween(latLng, stLatLng);
    if (dist <= radius) {
      results.push({
        name: s.name, tType:'subway', dist,
        geometry:{location: stLatLng},
        subwayId: s.id, line: s.line
      });
    }
  });
  results.sort((a,b) => a.dist - b.dist);
  return results;
}

// 【修正②】出発地側：徒歩圏内の駅 + タクシー用の真の最近隣を正確に取得
function getFromStationCandidates(latLng, walkLimit) {
  // 全駅との距離を計算して距離順にソート
  const all = ALL_STATIONS.map(s => {
    const stLatLng = new google.maps.LatLng(s.lat, s.lng);
    const dist = google.maps.geometry.spherical.computeDistanceBetween(latLng, stLatLng);
    return { name:s.name, tType:'subway', dist, geometry:{location:stLatLng}, subwayId:s.id, line:s.line };
  });
  all.sort((a,b) => a.dist - b.dist);

  // 徒歩圏内の駅（walkLimit以内）
  const walkable = all.filter(s => s.dist <= walkLimit);
  // 真の最近隣1駅（タクシー用）
  const nearest = all[0];

  return { walkable, nearest };
}

function calcSubwayRoute(boardId, alightId) {
  if(boardId === alightId) return {fare:0, time:0, transfers:0, lines:[]};

  const boardStation = ALL_STATIONS.find(s => s.id === boardId);
  const alightStation = ALL_STATIONS.find(s => s.id === alightId);
  if(!boardStation || !alightStation) return null;

  if(boardStation.line === alightStation.line){
    const line = SAPPORO_SUBWAY[boardStation.line];
    const bi = line.stations.findIndex(s => s.id === boardId);
    const ai = line.stations.findIndex(s => s.id === alightId);
    const stops = Math.abs(bi - ai);
    const distKm = calcLineDist(boardStation.line, bi, ai);
    return {
      fare: subwayFare(distKm), time: stops*2+2, transfers:0,
      lines:[{line:boardStation.line, from:boardStation.name, to:alightStation.name, color:boardStation.lineColor}],
      distKm
    };
  }

  const transferPoints = ['大通','さっぽろ'];
  let bestRoute = null;

  for(const tp of transferPoints){
    const tpIds = TRANSFER_STATIONS[tp];
    if(!tpIds) continue;
    const tpBoard = tpIds.find(id => id.startsWith(boardStation.line));
    const tpAlight = tpIds.find(id => id.startsWith(alightStation.line));
    if(!tpBoard || !tpAlight) continue;

    const seg1 = calcSingleLineSeg(boardId, tpBoard);
    const seg2 = calcSingleLineSeg(tpAlight, alightId);
    if(!seg1 || !seg2) continue;

    const totalDist = seg1.distKm + seg2.distKm;
    const totalFare = subwayFare(totalDist);
    const totalTime = seg1.time + seg2.time + 3;

    const route = {
      fare: totalFare, time: totalTime, transfers:1, transferAt: tp,
      lines:[
        {line:boardStation.line, from:boardStation.name, to:tp, color:boardStation.lineColor},
        {line:alightStation.line, from:tp, to:alightStation.name, color:alightStation.lineColor}
      ],
      distKm: totalDist
    };
    if(!bestRoute || totalFare < bestRoute.fare) bestRoute = route;
  }
  return bestRoute;
}

function calcSingleLineSeg(fromId, toId){
  const from = ALL_STATIONS.find(s => s.id === fromId);
  const to = ALL_STATIONS.find(s => s.id === toId);
  if(!from || !to || from.line !== to.line) return null;
  const line = SAPPORO_SUBWAY[from.line];
  const fi = line.stations.findIndex(s => s.id === fromId);
  const ti = line.stations.findIndex(s => s.id === toId);
  const stops = Math.abs(fi - ti);
  const distKm = calcLineDist(from.line, fi, ti);
  return {distKm, time: stops*2+1};
}

function calcLineDist(lineKey, fromIdx, toIdx){
  const stations = SAPPORO_SUBWAY[lineKey].stations;
  const min = Math.min(fromIdx, toIdx);
  const max = Math.max(fromIdx, toIdx);
  let dist = 0;
  for(let i = min; i < max; i++){
    const a = new google.maps.LatLng(stations[i].lat, stations[i].lng);
    const b = new google.maps.LatLng(stations[i+1].lat, stations[i+1].lng);
    dist += google.maps.geometry.spherical.computeDistanceBetween(a,b)/1000;
  }
  return Math.round(dist*10)/10;
}

function subwayFare(distKm){
  if(distKm <= 2) return 210;
  if(distKm <= 5) return 250;
  if(distKm <= 9) return 290;
  if(distKm <= 13) return 330;
  return 370;
}

function txCost(km){
  const t = TAXI[reg];
  const winter = reg==='sapporo' && document.getElementById('winter-check').checked;
  const overM = Math.max(0, km*1000 - t.startKm*1000);
  const base = t.start + Math.floor(overM/t.perM)*t.perCost;
  return Math.round(winter ? base*1.2 : base);
}

function walkTime(m){ return Math.round(m/80); }

function getDist(a,b){ return google.maps.geometry.spherical.computeDistanceBetween(a,b); }

function getDrivingRoute(origin, dest){
  return new Promise(resolve=>{
    directionsService.route({origin,destination:dest,travelMode:google.maps.TravelMode.DRIVING,region:'JP'},(result,status)=>{
      if(status!==google.maps.DirectionsStatus.OK){resolve(null);return;}
      const leg = result.routes[0].legs[0];
      resolve({result, distKm:Math.round(leg.distance.value/100)/10, duration:Math.round(leg.duration.value/60)});
    });
  });
}

function getWalkingRoute(origin, dest){
  return new Promise(resolve=>{
    directionsService.route({origin,destination:dest,travelMode:google.maps.TravelMode.WALKING,region:'JP'},(result,status)=>{
      if(status!==google.maps.DirectionsStatus.OK){resolve(null);return;}
      const leg = result.routes[0].legs[0];
      resolve({result, distM:leg.distance.value, duration:Math.round(leg.duration.value/60)});
    });
  });
}

async function search(){
  document.querySelectorAll('.errmsg').forEach(e=>e.remove());
  if(!fromLatLng){showErr('出発地を入力またはGPSで取得してください');return;}
  if(!toLatLng){showErr('目的地を選択または入力してください');return;}

  const btn = document.getElementById('go-btn');
  btn.disabled=true; btn.textContent='検索中...';
  document.getElementById('results').style.display='none';

  // 目的地側：3km圏内の駅を候補に（上位5駅）
  const destTransit = getNearbyStationsFromData(toLatLng, 3000).slice(0, 5);

  // 【修正②適用】出発地側：徒歩圏 + 真の最近隣を正確に取得
  const { walkable: walkableFrom, nearest: nearestFrom } = getFromStationCandidates(fromLatLng, walkLimit);

  routes = [];

  // タクシー直行
  const directTaxi = await getDrivingRoute(fromLatLng, toLatLng);
  if(directTaxi){
    routes.push({
      id:'direct', color:'#888780', title:'タクシー直行', isDirect:true,
      steps:[{type:'taxi',icon:'🚕',label:'タクシー直行',desc:`出発地 → ${toName}`,dist:`${directTaxi.distKm}km`,time:directTaxi.duration,cost:txCost(directTaxi.distKm),color:STEP_COLORS.taxi}],
      totalCost:txCost(directTaxi.distKm), totalTime:directTaxi.duration,
      mapSegments:[{result:directTaxi.result, color:'#888780'}]
    });
  }

  for(let i = 0; i < destTransit.length; i++){
    const ds = destTransit[i];
    const color = COLORS[i % COLORS.length];
    const destDistM = Math.round(getDist(ds.geometry.location, toLatLng));
    const destIsWalk = destDistM <= walkLimit;
    const taxiToDest = destIsWalk ? null : await getDrivingRoute(ds.geometry.location, toLatLng);
    if(!destIsWalk && !taxiToDest) continue;

    const lastLegCost = destIsWalk ? 0 : txCost(taxiToDest.distKm);
    const lastLegTime = destIsWalk ? walkTime(destDistM) : (taxiToDest ? taxiToDest.duration : 0);
    const lastStepDesc = `${ds.name} → ${toName}`;
    const lastStep = destIsWalk
      ? {type:'walk',icon:'🚶',label:'徒歩',desc:lastStepDesc,dist:`${destDistM}m`,time:lastLegTime,cost:0,color:STEP_COLORS.walk}
      : {type:'taxi',icon:'🚕',label:'タクシー',desc:lastStepDesc,dist:`${taxiToDest.distKm}km`,time:lastLegTime,cost:lastLegCost,color:STEP_COLORS.taxi};

    // ── 徒歩→地下鉄→タクシー/徒歩 ──
    if(walkableFrom.length > 0){
      // 徒歩圏内で最近隣の駅を使う
      const closest = walkableFrom[0];
      const walkDistM = Math.round(closest.dist);
      const wTime = walkTime(walkDistM);
      const walkRoute = await getWalkingRoute(fromLatLng, closest.geometry.location);

      const boardId = closest.subwayId;
      const alightId = ds.subwayId;
      let subwayInfo = null;
      if(boardId && alightId && boardId !== alightId){
        subwayInfo = calcSubwayRoute(boardId, alightId);
      }
      if(!allowTransfer && subwayInfo && subwayInfo.transfers > 0) continue;

      const stFare = subwayInfo ? subwayInfo.fare : 210;
      const stTime = subwayInfo ? subwayInfo.time : 5;
      const stDesc = subwayInfo && subwayInfo.transfers > 0
        ? `${closest.name} → [${subwayInfo.transferAt}乗換] → ${ds.name}`
        : `${closest.name} → ${ds.name}`;
      const stLabel = subwayInfo && subwayInfo.transfers > 0
        ? `地下鉄（${subwayInfo.transferAt}乗換）` : '地下鉄';
      const stIcon = '🚇';

      const mapSegs = [];
      if(walkRoute) mapSegs.push({result:walkRoute.result, color:STEP_COLORS.walk, strokeWeight:3});
      if(subwayInfo && subwayInfo.lines){
        subwayInfo.lines.forEach(l=>{
          const fromSt = ALL_STATIONS.find(s=>s.name===l.from&&s.line===l.line) || ALL_STATIONS.find(s=>s.name===l.from);
          const toSt = ALL_STATIONS.find(s=>s.name===l.to&&s.line===l.line) || ALL_STATIONS.find(s=>s.name===l.to);
          if(fromSt&&toSt) mapSegs.push({type:'straight',from:new google.maps.LatLng(fromSt.lat,fromSt.lng),to:new google.maps.LatLng(toSt.lat,toSt.lng),color:l.color||STEP_COLORS.subway});
        });
      } else {
        mapSegs.push({type:'straight',from:closest.geometry.location,to:ds.geometry.location,color:STEP_COLORS.subway});
      }
      if(!destIsWalk && taxiToDest) mapSegs.push({result:taxiToDest.result, color:STEP_COLORS.taxi});

      routes.push({
        id:`walk-${i}`, color,
        title:`徒歩→${stLabel}→${destIsWalk?'徒歩':'タクシー'}（${ds.name}降車）`,
        alightStation: ds.name,
        steps:[
          {type:'walk',icon:'🚶',label:'徒歩',desc:`出発地 → ${closest.name}`,dist:`${walkDistM}m`,time:wTime,cost:0,color:STEP_COLORS.walk},
          {type:'subway',icon:stIcon,label:stLabel,desc:stDesc,dist:subwayInfo?`約${subwayInfo.distKm}km`:'',time:stTime,cost:stFare,color:STEP_COLORS.subway},
          lastStep
        ],
        totalCost: stFare + lastLegCost,
        totalTime: wTime + stTime + lastLegTime,
        mapSegments: mapSegs
      });
    }

    // ── タクシー→地下鉄→タクシー/徒歩 ──
    // 【修正③】walkableFromが空、またはwalkLimitが設定されていてnearestFromがwalkLimitを超える場合のみ生成
    if(walkableFrom.length === 0 || nearestFrom.dist > walkLimit){
      // nearestFrom（真の最近隣）を使う
      const taxiToSt = await getDrivingRoute(fromLatLng, nearestFrom.geometry.location);
      if(taxiToSt){
        const taxiCostToSt = txCost(taxiToSt.distKm);
        const boardId2 = nearestFrom.subwayId;
        const alightId2 = ds.subwayId;
        let subwayInfo2 = null;
        if(boardId2 && alightId2 && boardId2 !== alightId2){
          subwayInfo2 = calcSubwayRoute(boardId2, alightId2);
        }
        if(!allowTransfer && subwayInfo2 && subwayInfo2.transfers > 0) continue;

        const stFare2 = subwayInfo2 ? subwayInfo2.fare : 210;
        const stTime2 = subwayInfo2 ? subwayInfo2.time : 5;
        const stDesc2 = subwayInfo2 && subwayInfo2.transfers > 0
          ? `${nearestFrom.name} → [${subwayInfo2.transferAt}乗換] → ${ds.name}`
          : `${nearestFrom.name} → ${ds.name}`;
        const stLabel2 = subwayInfo2 && subwayInfo2.transfers > 0
          ? `地下鉄（${subwayInfo2.transferAt}乗換）` : '地下鉄';

        const mapSegs2 = [];
        mapSegs2.push({result:taxiToSt.result, color:STEP_COLORS.taxi});
        mapSegs2.push({type:'straight', from:nearestFrom.geometry.location, to:ds.geometry.location, color:STEP_COLORS.subway});
        if(!destIsWalk && taxiToDest) mapSegs2.push({result:taxiToDest.result, color:STEP_COLORS.taxi});

        routes.push({
          id:`taxi-${i}`, color,
          title:`タクシー→${stLabel2}→${destIsWalk?'徒歩':'タクシー'}（${ds.name}降車）`,
          alightStation: ds.name,
          steps:[
            {type:'taxi',icon:'🚕',label:'タクシー',desc:`出発地 → ${nearestFrom.name}`,dist:`${taxiToSt.distKm}km`,time:taxiToSt.duration,cost:taxiCostToSt,color:STEP_COLORS.taxi},
            {type:'subway',icon:'🚇',label:stLabel2,desc:stDesc2,dist:subwayInfo2?`約${subwayInfo2.distKm}km`:'',time:stTime2,cost:stFare2,color:STEP_COLORS.subway},
            lastStep
          ],
          totalCost: taxiCostToSt + stFare2 + lastLegCost,
          totalTime: taxiToSt.duration + stTime2 + lastLegTime,
          mapSegments: mapSegs2
        });
      }
    }
  }

  // 重複除去
  const seen = new Set();
  routes = routes.filter(r=>{
    const key = r.isDirect ? 'direct' : (r.alightStation || r.title);
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  if(routes.length === 0){showErr('ルートが見つかりませんでした。');btn.disabled=false;btn.textContent='最適ルートを検索する';return;}
  routes.sort((a,b) => a.totalCost - b.totalCost);

  renderAll();
  btn.disabled=false; btn.textContent='最適ルートを検索する';
  document.getElementById('results').style.display='block';
  setTimeout(()=>document.getElementById('results').scrollIntoView({behavior:'smooth'}),100);
}

function renderAll(){
  const minC = routes[0].totalCost;
  const minT = Math.min(...routes.map(r=>r.totalTime));
  document.getElementById('sum-row').innerHTML=`
    <div class="scard"><div class="sl">最安ルート</div><div class="sv">¥${minC.toLocaleString()}</div><div class="ss">${routes[0].isDirect?'直行':routes[0].alightStation||''}</div></div>
    <div class="scard"><div class="sl">最速ルート</div><div class="sv">${minT}分〜</div><div class="ss">${routes.find(r=>r.totalTime===minT).isDirect?'直行':routes.find(r=>r.totalTime===minT).alightStation||''}</div></div>
    <div class="scard"><div class="sl">比較数</div><div class="sv">${routes.length}件</div><div class="ss">ルート候補</div></div>`;

    <div class="leg"><div class="leg-line" style="background:${STEP_COLORS.walk}"></div>徒歩</div>
    <div class="leg"><div class="leg-line" style="background:${STEP_COLORS.subway}"></div>地下鉄</div>
    <div class="leg"><div class="leg-line" style="background:${STEP_COLORS.taxi}"></div>タクシー</div>`;

  document.getElementById('result-list').innerHTML = routes.map((r,i)=>{
    const isBest = i===0;
    const isFast = r.totalTime===minT && i!==0;
    const stepsHTML = r.steps.map(s=>`
      <div class="flow-step" style="background:${s.color}18">
        <span class="step-icon">${s.icon}</span>
        <div class="step-body">
          <div class="step-main">${s.label}${s.dist?' · '+s.dist:''}</div>
          <div class="step-sub">${s.desc}${s.time?' · 約'+s.time+'分':''}</div>
        </div>
        <div class="step-cost">${s.cost>0?'¥'+s.cost.toLocaleString():s.cost===0?'無料':''}</div>
      </div>`).join('');
    return `<div class="flow-card${isBest?' best':''}" onclick="selRoute(${i})">
      ${isBest?'<span class="badge best">★ 最安おすすめ</span> ':''}${isFast?'<span class="badge fast">⚡ 最速</span> ':''}
      <div class="flow-header">
        <div class="flow-title">${r.title}</div>
        <div class="flow-total"><div class="flow-cost">¥${r.totalCost.toLocaleString()}</div><div class="flow-time">約${r.totalTime}分〜</div></div>
      </div>
      <div class="flow-steps">${stepsHTML}</div>
    </div>`;
  }).join('');

  const t = TAXI[reg];
  const winter = reg==='sapporo' && document.getElementById('winter-check').checked;
  document.getElementById('disc-text').textContent=`※ ${t.name}地域タクシー料金（初乗り${t.start}円/${t.startKm}kmまで・以降${t.perM}mごと${t.perCost}円）${winter?'・冬季割増2割増適用':''}。地下鉄運賃は札幌市営地下鉄の区数制料金（乗り換え考慮）。所要時間・運賃は概算です。`;
}

function selRoute(i){
  showMap(i);
  document.querySelectorAll('.flow-card').forEach((el,j)=>{
    el.classList.remove('sel');
    if(j===0) el.classList.add('best');
    if(j===i && i!==0) el.classList.add('sel');
  });
}

function showMap(i){
  renderers.forEach(r=>{try{if(r.setMap)r.setMap(null);else if(r.setOptions)r.setOptions({map:null});}catch(e){}});
  renderers=[];
  if(!routes[i]||!gmap) return;
  const bounds = new google.maps.LatLngBounds();
  if(fromLatLng) bounds.extend(fromLatLng);
  if(toLatLng) bounds.extend(toLatLng);
  (routes[i].mapSegments||[]).forEach(seg=>{
    if(seg.type==='straight'){
      const line = new google.maps.Polyline({path:[seg.from,seg.to],strokeColor:seg.color,strokeWeight:4,strokeOpacity:0.85,map:gmap});
      renderers.push(line); bounds.extend(seg.from); bounds.extend(seg.to);
    } else if(seg.result){
      const renderer = new google.maps.DirectionsRenderer({directions:seg.result,suppressMarkers:true,polylineOptions:{strokeColor:seg.color,strokeWeight:seg.strokeWeight||5,strokeOpacity:0.85}});
      renderer.setMap(gmap); renderers.push(renderer);
      const leg = seg.result.routes[0].legs[0];
      bounds.extend(leg.start_location); bounds.extend(leg.end_location);
    }
  });
  if(fromLatLng){const m=new google.maps.Marker({position:fromLatLng,map:gmap,label:{text:'出',color:'#fff',fontSize:'11px'},icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:'#378ADD',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}});renderers.push(m);}
  if(toLatLng){const m=new google.maps.Marker({position:toLatLng,map:gmap,label:{text:'着',color:'#fff',fontSize:'11px'},icon:{path:google.maps.SymbolPath.CIRCLE,scale:14,fillColor:'#E24B4A',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}});renderers.push(m);}
  if(!bounds.isEmpty()) gmap.fitBounds(bounds,{top:20,bottom:20,left:20,right:20});
}

function showErr(msg){ const e=document.createElement('div'); e.className='errmsg'; e.textContent=msg; document.querySelector('.container').insertBefore(e,document.getElementById('results')); }

window.initMap = initMap;
</script>
